<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>WebSocket Demo</title>
  <style>
    body { font-family: sans-serif; max-width: 600px; margin: 40px auto; padding: 0 20px; }
    #log { border: 1px solid #ccc; padding: 10px; height: 300px; overflow-y: auto; background: #f9f9f9; font-family: monospace; font-size: 14px; }
    .msg-in { color: green; }
    .msg-out { color: blue; }
    .msg-sys { color: #888; }
    input, button { padding: 8px 12px; font-size: 14px; margin-top: 10px; }
    input { width: 70%; }
  </style>
</head>
<body>
  <h1>WebSocket Demo</h1>
  <div id="log"></div>
  <div>
    <input id="msg" type="text" placeholder="Type a message..." autofocus>
    <button id="send">Send</button>
  </div>
  <button id="toggle" style="margin-top:10px">Connect</button>

  <script>
    const log = document.getElementById('log');
    const msgInput = document.getElementById('msg');
    const sendBtn = document.getElementById('send');
    const toggleBtn = document.getElementById('toggle');
    let ws = null;

    function appendLog(text, cls) {
      const div = document.createElement('div');
      div.className = cls;
      div.textContent = text;
      log.appendChild(div);
      log.scrollTop = log.scrollHeight;
    }

    function connect() {
      const proto = location.protocol === 'https:' ? 'wss' : 'ws';
      ws = new WebSocket(`${proto}://${location.host}/ws`);

      ws.onopen = () => {
        appendLog('Connected', 'msg-sys');
        toggleBtn.textContent = 'Disconnect';
      };
      ws.onmessage = (e) => appendLog('← ' + e.data, 'msg-in');
      ws.onclose = () => {
        appendLog('Disconnected', 'msg-sys');
        toggleBtn.textContent = 'Connect';
        ws = null;
      };
      ws.onerror = () => appendLog('Error', 'msg-sys');
    }

    function disconnect() {
      if (ws) ws.close();
    }

    toggleBtn.addEventListener('click', () => ws ? disconnect() : connect());

    sendBtn.addEventListener('click', send);
    msgInput.addEventListener('keydown', (e) => { if (e.key === 'Enter') send(); });

    function send() {
      const text = msgInput.value.trim();
      if (!text || !ws || ws.readyState !== WebSocket.OPEN) return;
      ws.send(text);
      appendLog('→ ' + text, 'msg-out');
      msgInput.value = '';
    }
  </script>
</body>
</html>
